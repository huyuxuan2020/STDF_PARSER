name: Release (auto-update)

# 正式发版：推一个 v* tag 即可同时构建 macOS + Windows，
# 自动用更新私钥签名、生成 latest.json，并发布 GitHub Release。
# 用户端 App 启动时会读取 Release 里的 latest.json 来检查更新。
#
#   git tag v0.2.0
#   git push origin v0.2.0
#
# 注意：tauri.conf.json 里的 version 要先改成与 tag 一致（去掉前缀 v）。
#
# 发布顺序（避免「包还没传完、版本却已经能被检测到」的竞态）：
#   1) create-release —— 先建一个【草稿】Release。草稿不会被
#      `releases/latest` 命中，所以此时所有用户仍只看到旧版本。
#   2) build-tauri    —— macOS / Windows 并行构建、签名，把安装包和
#      latest.json 上传到这个草稿 Release。
#   3) publish-release —— 两个平台都成功后，才把 Release 取消草稿、
#      正式发布。此刻 latest.json 与所有安装包一并对外可见，
#      用户检测到更新时安装包必定已存在，不会再下载 404。
on:
  push:
    tags:
      - "v*"
  # 也允许手动触发（需要在下面填一个已存在的 tag 名）
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag（如 v0.2.0）"
        required: true

env:
  TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # ── 1) 先建草稿 Release，输出 release_id 供后续 job 使用 ──
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      # 需要 checkout 才能读到仓库根的 RELEASE_NOTES.md。
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = process.env.TAG_NAME;
            // 面向用户的发布说明：写在仓库根的 RELEASE_NOTES.md。
            // 每次发版前更新这个文件即可，不用再改 workflow。
            const body = fs.readFileSync('RELEASE_NOTES.md', 'utf8').trim();
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `STDF Parser ${tag}`,
              body,
              draft: true,
              prerelease: false,
            });
            return data.id;

  # ── 2) 并行构建两个平台，上传到上面的草稿 Release ──
  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build, sign & upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # —— 自动更新签名（两个平台都需要）——
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # —— macOS 代码签名 + 公证（仅 mac 任务用到，windows 任务忽略）——
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        with:
          # 上传到上面的草稿 Release（不再各自创建 Release，避免竞态）。
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  # ── 3) 两个平台都成功后，才正式发布（取消草稿）──
  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.release_id),
              draft: false,
              prerelease: false,
            });
